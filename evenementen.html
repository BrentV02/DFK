<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFK – Evenementen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; }

    #dfk-root * { box-sizing: border-box; }
    #dfk-root { background: #0a0a0a; min-height: 100vh; display: flex; flex-direction: column; font-family: 'Barlow', sans-serif; }

    #dfk-root .nav { background: #111; border-bottom: 3px solid #E02020; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
    #dfk-root .nav-logo { display: flex; align-items: center; gap: 14px; }
    #dfk-root .nav-divider { width: 1px; height: 28px; background: #2a2a2a; margin: 0 4px; }
    #dfk-root .nav-right { display: flex; align-items: center; gap: 12px; position: relative; }
    #dfk-root .nav-user-btn { display: flex; align-items: center; gap: 10px; background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 4px; padding: 7px 14px; cursor: pointer; color: #ccc; font-size: 13px; font-family: 'Barlow', sans-serif; }
    #dfk-root .nav-user-btn:hover { border-color: #E02020; color: #fff; }
    #dfk-root .nav-avatar { width: 28px; height: 28px; border-radius: 50%; background: #E02020; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0; }
    #dfk-root .nav-chevron { font-size: 10px; color: #666; }

    #dfk-root .dropdown { display: none; position: absolute; top: calc(100% + 8px); right: 0; background: #141414; border: 1px solid #2a2a2a; border-top: 2px solid #E02020; border-radius: 4px; min-width: 200px; z-index: 200; }
    #dfk-root .dropdown.open { display: block; }
    #dfk-root .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; color: #ccc; font-size: 13px; cursor: pointer; border-bottom: 1px solid #1e1e1e; }
    #dfk-root .dropdown-item:last-child { border-bottom: none; }
    #dfk-root .dropdown-item:hover { background: #1c1c1c; color: #fff; }
    #dfk-root .dropdown-item.danger { color: #ff5555; }
    #dfk-root .dropdown-item.danger:hover { background: #1c1c1c; }
    #dfk-root .di-icon { font-size: 15px; width: 18px; text-align: center; }

    #dfk-root .main { flex: 1; padding: 2.5rem 2rem; max-width: 1100px; width: 100%; margin: 0 auto; }
    #dfk-root .page-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 32px; color: #fff; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
    #dfk-root .page-sub { font-size: 13px; color: #666; margin-bottom: 2rem; }
    #dfk-root .section-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #E02020; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; margin-bottom: 1.2rem; }

    #dfk-root .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    #dfk-root .event-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 4px; overflow: hidden; }
    #dfk-root .event-card-top { background: #E02020; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
    #dfk-root .event-date { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 2px; color: #fff; text-transform: uppercase; }
    #dfk-root .event-badge { background: rgba(0,0,0,0.25); border-radius: 3px; padding: 3px 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 1px; color: #fff; text-transform: uppercase; }
    #dfk-root .event-body { padding: 16px; }
    #dfk-root .event-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; color: #fff; letter-spacing: 1px; margin-bottom: 4px; }
    #dfk-root .event-circuit { font-size: 13px; color: #888; margin-bottom: 12px; }
    #dfk-root .event-deadline { font-size: 11px; color: #666; margin-bottom: 10px; }
    #dfk-root .event-deadline.urgent { color: #E02020; }
    #dfk-root .countdown-top { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,0.85); margin-top: 5px; }
    #dfk-root .countdown-top strong { color: #fff; font-size: 12px; }
    #dfk-root .event-classes { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    #dfk-root .class-tag { background: #1c1c1c; border: 1px solid #333; border-radius: 3px; padding: 3px 8px; font-size: 11px; color: #aaa; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 1px; }
    #dfk-root .event-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #1e1e1e; padding-top: 12px; }
    #dfk-root .inschrijf-btn { background: #E02020; color: #fff; border: none; border-radius: 3px; padding: 8px 16px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
    #dfk-root .inschrijf-btn:hover { background: #c01010; }
    #dfk-root .inschrijf-btn.vol { background: #2a2a2a; color: #555; cursor: default; }
    #dfk-root .inschrijf-btn.ingeschreven { background: #1a3a1a; border: 1px solid #2a6a2a; color: #4cff4c; cursor: default; }
    #dfk-root .events-empty { text-align: center; padding: 4rem 1rem; color: #444; font-size: 13px; grid-column: 1/-1; }
    #dfk-root .events-empty-icon { font-size: 36px; margin-bottom: 0.6rem; }

    /* ── Tabs ── */
    #dfk-root .tab-bar { background: #111; border-bottom: 3px solid #1a1a1a; display: flex; position: sticky; top: 60px; z-index: 99; }
    #dfk-root .tab-btn { flex: 1; padding: 13px 8px; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: #555; border: none; border-bottom: 3px solid transparent; background: transparent; cursor: pointer; margin-bottom: -3px; transition: color 0.15s; }
    #dfk-root .tab-btn.on { color: #fff; border-bottom-color: #E02020; }
    #dfk-root .tab-panel { display: none; }
    #dfk-root .tab-panel.on { display: block; }

    /* ── Mijn Inschrijvingen ── */
    #dfk-root .inschrijving-card { background: #141414; border: 1px solid #2a2a2a; border-left: 3px solid #E02020; border-radius: 4px; padding: 14px 16px; margin-bottom: 12px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    #dfk-root .inschrijving-info { flex: 1; }
    #dfk-root .inschrijving-naam { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; color: #fff; letter-spacing: 1px; margin-bottom: 4px; }
    #dfk-root .inschrijving-meta { font-size: 13px; color: #888; margin-bottom: 2px; }
    #dfk-root .inschrijving-reg { font-size: 11px; color: #555; margin-top: 6px; }
    #dfk-root .uitschrijf-btn { background: none; border: 1px solid #333; border-radius: 3px; color: #666; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 6px 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    #dfk-root .uitschrijf-btn:hover { border-color: #E02020; color: #E02020; }
    #dfk-root .uitschrijf-side { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
    #dfk-root .uitschrijf-dl { font-size: 10px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #555; text-align: right; line-height: 1.5; }
    #dfk-root .uitschrijf-dl.urgent { color: #cc2020; }
    #dfk-root .uitschrijf-dl strong { font-size: 12px; color: #ff4444; }
    #dfk-root .inschrijvingen-empty { text-align: center; padding: 4rem 1rem; color: #444; font-size: 13px; }
    #dfk-root .inschrijvingen-empty-icon { font-size: 36px; margin-bottom: 0.6rem; }

    #dfk-root .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; }
    #dfk-root .overlay.open { display: block; }
    #dfk-root .account-panel { position: fixed; top: 0; right: -480px; width: 460px; height: 100vh; height: 100dvh; background: #141414; border-left: 3px solid #E02020; z-index: 400; display: flex; flex-direction: column; transition: right 0.25s ease; overflow: hidden; }
    #dfk-root .account-panel.open { right: 0; }
    #dfk-root .panel-header { background: #111; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
    #dfk-root .panel-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
    #dfk-root .panel-close { background: none; border: none; color: #666; font-size: 22px; cursor: pointer; line-height: 1; }
    #dfk-root .panel-close:hover { color: #fff; }
    #dfk-root .panel-body { padding: 24px; flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    #dfk-root .section-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #E02020; margin: 1.4rem 0 0.8rem; border-bottom: 1px solid #2a2a2a; padding-bottom: 6px; display: block; }
    #dfk-root .section-title:first-child { margin-top: 0; }
    #dfk-root .field-label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-bottom: 6px; }
    #dfk-root .field-input { display: block; width: 100%; background: #1c1c1c; border: 1px solid #333; color: #fff; padding: 11px 12px; font-size: 14px; border-radius: 3px; margin-bottom: 1rem; outline: none; font-family: 'Barlow', sans-serif; }
    #dfk-root .field-input:focus { border-color: #E02020; }
    #dfk-root .field-select { display: block; width: 100%; background: #1c1c1c; border: 1px solid #333; color: #fff; padding: 11px 12px; font-size: 14px; border-radius: 3px; margin-bottom: 1rem; outline: none; font-family: 'Barlow', sans-serif; }
    #dfk-root .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
    #dfk-root .two-col .field-input, #dfk-root .two-col .field-select { margin-bottom: 0; }
    #dfk-root .save-btn { display: block; width: 100%; padding: 14px; background: #E02020; color: #fff; border: none; border-radius: 3px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; margin-top: 1.5rem; }
    #dfk-root .save-btn:hover { background: #c01010; }
    #dfk-root .edit-btn { background: #1c1c1c; border: 1px solid #444; color: #ccc; border-radius: 3px; padding: 6px 14px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
    #dfk-root .edit-btn:hover { border-color: #E02020; color: #fff; }
    #dfk-root .cancel-btn { display: block; width: 100%; padding: 12px; background: transparent; color: #666; border: 1px solid #2a2a2a; border-radius: 3px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-top: 8px; }
    #dfk-root .cancel-btn:hover { color: #ccc; border-color: #444; }
    #dfk-root .chk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 1rem; }
    #dfk-root .chk-item { display: flex; align-items: center; gap: 8px; background: #1c1c1c; border: 1px solid #333; border-radius: 3px; padding: 9px 10px; cursor: pointer; }
    #dfk-root .chk-item.on { border-color: #E02020; background: #2a1010; }
    #dfk-root .chk-box { width: 16px; height: 16px; border: 1px solid #555; border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #111; }
    #dfk-root .chk-item.on .chk-box { background: #E02020; border-color: #E02020; }
    #dfk-root .chk-mark { color: #fff; font-size: 11px; font-weight: 700; display: none; }
    #dfk-root .chk-item.on .chk-mark { display: block; }
    #dfk-root .chk-label { font-size: 13px; color: #ccc; }
    #dfk-root .chk-item.on .chk-label { color: #fff; }
    #dfk-root .toggle-row { display: flex; align-items: center; justify-content: space-between; background: #1c1c1c; border: 1px solid #333; border-radius: 3px; padding: 10px 12px; margin-bottom: 0.8rem; }
    #dfk-root .toggle-row span { font-size: 13px; color: #ccc; }
    #dfk-root .toggle-group { display: flex; gap: 6px; }
    #dfk-root .tog-btn { padding: 4px 14px; border-radius: 3px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 1px; cursor: pointer; border: 1px solid #444; background: transparent; color: #888; }
    #dfk-root .tog-btn.yes.on { background: #1a5c1a; color: #4cff4c; border-color: #2a8a2a; }
    #dfk-root .tog-btn.no.on { background: #5c1a1a; color: #ff6666; border-color: #8a2a2a; }
    #dfk-root .benzine-opts { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
    #dfk-root .benz-btn { padding: 10px 12px; border-radius: 3px; font-family: 'Barlow', sans-serif; font-size: 13px; cursor: pointer; border: 1px solid #444; background: #1c1c1c; color: #aaa; text-align: left; }
    #dfk-root .benz-btn.on { background: #2a1010; color: #fff; border-color: #E02020; }

    /* ── Inschrijven bevestigingspaneel ── */
    #dfk-root .inschrijf-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 500; }
    #dfk-root .inschrijf-overlay.open { display: block; }
    #dfk-root .inschrijf-panel { position: fixed; top: 0; right: -520px; width: 500px; height: 100vh; height: 100dvh; background: #141414; border-left: 3px solid #E02020; z-index: 600; display: flex; flex-direction: column; transition: right 0.25s ease; overflow: hidden; }
    #dfk-root .inschrijf-panel .panel-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2rem; }
    #dfk-root .inschrijf-panel.open { right: 0; }
    #dfk-root .ev-confirm-box { background: #1a0808; border: 1px solid #3a1010; border-left: 3px solid #E02020; border-radius: 3px; padding: 16px; margin-bottom: 1.4rem; }
    #dfk-root .ev-confirm-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; color: #fff; letter-spacing: 1px; margin-bottom: 6px; }
    #dfk-root .ev-confirm-meta { font-size: 13px; color: #aaa; }
    #dfk-root .cf-field { margin-bottom: 0.85rem; }
    #dfk-root .cf-label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #555; margin-bottom: 3px; }
    #dfk-root .cf-value { font-size: 14px; color: #ccc; }
    #dfk-root .cf-two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 0.85rem; }
    #dfk-root .cf-two .cf-field { margin-bottom: 0; }
    #dfk-root .confirm-vraag { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 26px; color: #fff; letter-spacing: 2px; text-transform: uppercase; margin: 1.8rem 0 0.4rem; }
    #dfk-root .confirm-hint { font-size: 13px; color: #666; margin-bottom: 1.5rem; line-height: 1.5; }
    #dfk-root .bevestig-btn { display: block; width: 100%; padding: 14px; background: #E02020; color: #fff; border: none; border-radius: 3px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; }
    #dfk-root .bevestig-btn:hover { background: #c01010; }
    #dfk-root .annuleer-btn { display: block; width: 100%; padding: 12px; background: transparent; color: #666; border: 1px solid #2a2a2a; border-radius: 3px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-top: 8px; }
    #dfk-root .annuleer-btn:hover { color: #ccc; border-color: #444; }
    #dfk-root .save-msg { font-size: 12px; text-align: center; margin-top: 8px; min-height: 18px; font-family: 'Barlow', sans-serif; }
    #dfk-root .rijder-kaart { display: flex; align-items: center; justify-content: space-between; background: #1c1c1c; border: 1px solid #333; border-radius: 3px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
    #dfk-root .rijder-kaart:hover { border-color: #E02020; }
    #dfk-root .rijder-kaart-naam { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; color: #fff; letter-spacing: 1px; }
    #dfk-root .rijder-kaart-sub { font-size: 12px; color: #666; margin-top: 2px; font-family: 'Barlow', sans-serif; }
    #dfk-root .acc-add-btn { display: block; width: 100%; padding: 12px; background: transparent; color: #888; border: 1px dashed #333; border-radius: 3px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-top: 4px; text-align: center; }
    #dfk-root .acc-add-btn:hover { border-color: #E02020; color: #fff; }
    #dfk-root .acc-back-btn { background: none; border: none; color: #888; font-size: 22px; cursor: pointer; padding: 0 8px 0 0; line-height: 1; }
    #dfk-root .acc-back-btn:hover { color: #fff; }
    #dfk-root .kart-type-keuze { display: flex; gap: 8px; margin-bottom: 1rem; }
    #dfk-root .kart-type-keuze-btn { flex: 1; padding: 12px 8px; border: 1px solid #444; border-radius: 3px; background: #1c1c1c; color: #888; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1px; cursor: pointer; }
    #dfk-root .kart-type-keuze-btn.on { border-color: #E02020; background: #2a1010; color: #fff; }
    @media (max-width: 768px) {
      #dfk-root .inschrijf-panel { width: 100%; right: -100%; }
      #dfk-root .account-panel { width: 100%; right: -100%; }
    }
    #dfk-root #inschrijf-panel input[type="date"] { width: 100% !important; max-width: 100% !important; min-width: 0 !important; box-sizing: border-box !important; -webkit-appearance: none; appearance: none; }
  </style>
</head>
<body>

<div id="dfk-root" class="locked">

  <nav class="nav">
    <div class="nav-logo">
      <img src="logos/dfk-logo.png" alt="DFK Logo" style="height:38px; width:auto;" />
      <div class="nav-divider"></div>
    </div>
    <div class="nav-right">
      <button class="nav-user-btn" onclick="toggleDropdown()">
        <div class="nav-avatar" id="nav-avatar">?</div>
        <span id="nav-naam">Laden...</span>
        <span class="nav-chevron">▼</span>
      </button>
      <div class="dropdown" id="user-dropdown">
        <div class="dropdown-item" onclick="openAccount()">
          <span class="di-icon">👤</span> Mijn account
        </div>
        <div class="dropdown-item" id="admin-link" style="display:none;" onclick="window.location.href='admin.html'">
          <span class="di-icon">⚙</span> Admin
        </div>
        <div class="dropdown-item" id="werkplaats-link" style="display:none;" onclick="window.location.href='werkplaats.html'">
          <span class="di-icon">🔧</span> Werkplaats
        </div>
        <div class="dropdown-item danger" onclick="uitloggen()">
          <span class="di-icon">↩</span> Uitloggen
        </div>
      </div>
    </div>
  </nav>

  <div class="tab-bar">
    <button class="tab-btn on" onclick="switchTab('evenementen')">Evenementen</button>
    <button class="tab-btn" onclick="switchTab('inschrijvingen')">Mijn Inschrijvingen</button>
  </div>

  <div id="tab-evenementen" class="tab-panel on">
    <div class="main">
      <div class="page-title">Evenementen</div>
      <p class="page-sub">Overzicht van alle komende races en activiteiten</p>
      <div class="section-label">Komende evenementen</div>
      <div class="events-grid" id="events-grid">
        <div class="events-empty"><div class="events-empty-icon">⏳</div>Evenementen laden...</div>
      </div>
      <div id="past-section" style="display:none; margin-top:2.5rem;">
        <div class="section-label" style="color:#555; border-color:#1e1e1e;">Afgelopen evenementen</div>
        <div class="events-grid" id="past-grid"></div>
      </div>
    </div>
  </div>

  <div id="tab-inschrijvingen" class="tab-panel">
    <div class="main">
      <div class="page-title">Mijn Inschrijvingen</div>
      <p class="page-sub">Overzicht van alle evenementen waarvoor je bent ingeschreven</p>
      <div class="section-label">Inschrijvingen</div>
      <div id="inschrijvingen-list"></div>
    </div>
  </div>

  <div class="overlay" id="overlay" onclick="closeAccount()"></div>

  <div class="inschrijf-overlay" id="inschrijf-overlay" onclick="sluitInschrijven()"></div>
  <div class="inschrijf-panel" id="inschrijf-panel">
    <div class="panel-header">
      <span class="panel-title">Inschrijven</span>
      <button class="panel-close" onclick="sluitInschrijven()">✕</button>
    </div>
    <div class="panel-body" id="inschrijf-body"></div>
  </div>

  <!-- Account paneel -->
  <div class="account-panel" id="account-panel">
    <div class="panel-header">
      <div style="display:flex;align-items:center;">
        <button id="acc-back-btn" class="acc-back-btn" onclick="_accTerugNaarLijst()" style="display:none;">←</button>
        <span class="panel-title" id="acc-panel-title">Mijn Account</span>
      </div>
      <button class="panel-close" onclick="closeAccount()">✕</button>
    </div>
    <div class="panel-body" id="acc-body"></div>
  </div>

</div>

<script>
// ── State ────────────────────────────────────
const MAANDEN    = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const DAGEN_KORT = ['zo','ma','di','wo','do','vr','za'];
const BENZ_LABELS = ['Ik neem altijd zelf benzine mee','Ik pak altijd benzine bij DFK','Training: zelf — Wedstrijd: bij DFK'];
const KAMPIOENSCHAPPEN = ['Iame Benelux','NK Iame','GK4','Club Venray','Hobby'];
const KLASSEN = ['Iame Mini','KA100','X30 Junior','X30 Senior','Iame Super Shifter','Formula Honda Cadet','Formula Honda Junior','Formula Honda Senior','Rotax'];

let _currentUser      = null;
let _currentProfile   = null;
let _accountRijders   = [];   // alle rijders gekoppeld aan dit account
let _selectedRijder   = null; // gekozen rijder bij inschrijven
let _editingRijder    = null; // rijder die bewerkt wordt in account-paneel
let _allEvents        = [];
let _myEventIds       = new Set();
let _myInschrijvingen = [];
let _currentEvent     = null;
let _selectedKlasse   = null;

// ── Init ─────────────────────────────────────
(async () => {
  try {
    const session = await requireAuth();
    if (!session) return;
    _currentUser = session.user;
    await loadAccountRijders();
    updateNavbar();
    await Promise.all([loadEvents(), loadMyInschrijvingen()]);
    renderEvents();
  } catch(e) {
    console.error('Init fout:', e);
    document.getElementById('events-grid').innerHTML =
      `<div class="events-empty"><div class="events-empty-icon">⚠️</div>Kon evenementen niet laden.</div>`;
  }
})();

// ── Navbar ───────────────────────────────────
function updateNavbar() {
  const p   = _currentProfile;
  const naam = p ? `${p.voornaam || ''} ${p.naam || ''}`.trim() || 'Rijder' : 'Rijder';
  const ini  = naam.split(' ').map(w => w[0] || '').join('').toUpperCase().slice(0,2) || '?';
  document.getElementById('nav-avatar').textContent = ini;
  document.getElementById('nav-naam').textContent   = naam;
  // Toon admin-link alleen voor admins
  document.getElementById('admin-link').style.display    = (p?.rol === 'admin') ? '' : 'none';
  document.getElementById('werkplaats-link').style.display = (p?.rol === 'admin') ? '' : 'none';
}

// ── Data laden ───────────────────────────────
async function loadEvents() {
  const { data, error } = await _supabase
    .from('evenementen')
    .select('*')
    .order('datum', { ascending: true });
  if (!error && data) _allEvents = data;
}

async function loadAccountRijders() {
  const { data } = await _supabase
    .from('profiles')
    .select('*')
    .eq('account_id', _currentUser.id);
  if (data && data.length > 0) {
    _accountRijders = data;
  } else {
    // Fallback voor bestaande accounts zonder account_id
    const p = await getProfile(_currentUser.id);
    _accountRijders = p ? [p] : [];
  }
  _currentProfile = _accountRijders.find(r => r.id === _currentUser.id) || _accountRijders[0] || null;
}

async function loadMyInschrijvingen() {
  if (!_currentUser) return;
  const ids = _accountRijders.map(r => r.id);
  if (!ids.length) return;
  const { data, error } = await _supabase
    .from('inschrijvingen')
    .select('*, evenementen(*)')
    .in('rijder_id', ids);
  if (!error && data) {
    _myInschrijvingen = data;
    _myEventIds = new Set(data.map(i => i.event_id));
  }
}

// ── Wachtwoord bevestiging live-check ─────────
function checkAccPwMatch() {
  const pw  = document.getElementById('acc-pw')?.value  || '';
  const pw2 = document.getElementById('acc-pw2')?.value || '';
  const msg = document.getElementById('acc-pw-msg');
  if (!msg) return;
  if (!pw && !pw2) { msg.textContent = ''; return; }
  if (!pw2) { msg.textContent = ''; return; }
  if (pw === pw2) {
    msg.style.color = '#4cff4c';
    msg.textContent = '✓ Wachtwoorden komen overeen';
  } else {
    msg.style.color = '#E02020';
    msg.textContent = 'Wachtwoorden komen niet overeen';
  }
}

// ── Uitloggen ────────────────────────────────
async function uitloggen() {
  await _supabase.auth.signOut();
  window.location.href = 'index.html';
}

// ── Evenementen renderen ─────────────────────
function renderEvents() {
  const grid     = document.getElementById('events-grid');
  const pastGrid = document.getElementById('past-grid');
  const pastSec  = document.getElementById('past-section');

  if (_allEvents.length === 0) {
    grid.innerHTML = `<div class="events-empty"><div class="events-empty-icon">📅</div>Er zijn nog geen evenementen gepland.</div>`;
    pastSec.style.display = 'none';
    return;
  }
  const now   = new Date();
  const today = new Date(); today.setHours(0,0,0,0);

  const upcoming = _allEvents.filter(ev => new Date(ev.datum + 'T12:00:00') >= today);
  const past     = _allEvents.filter(ev => new Date(ev.datum + 'T12:00:00') <  today).reverse(); // meest recent bovenaan

  if (upcoming.length === 0) {
    grid.innerHTML = `<div class="events-empty"><div class="events-empty-icon">📅</div>Er zijn geen komende evenementen gepland.</div>`;
  }

  const buildCard = ev => {
    const d       = new Date(ev.datum + 'T12:00:00');
    const isPast  = d < today;
    const dagenOver = Math.round((d - today) / 86400000);

    // ── Deadline ──
    let deadlineHtml = '';
    let deadlinePassed = false;
    if (ev.deadline) {
      const dl = new Date(ev.deadline);
      deadlinePassed = dl < now;
      const msLeft = dl - now;
      const isWithin24h = msLeft > 0 && msLeft < 24 * 3600 * 1000;
      const dagenTotDeadline = Math.round((dl - today) / 86400000);
      const urgent = dagenTotDeadline >= 0 && dagenTotDeadline <= 7;
      const dlUur = dl.getHours().toString().padStart(2,'0');
      const dlMin = dl.getMinutes().toString().padStart(2,'0');
      const tijdStr = `${dl.getDate()} ${MAANDEN[dl.getMonth()]} ${dl.getFullYear()} om ${dlUur}:${dlMin}`;
      if (deadlinePassed) {
        deadlineHtml = `<div class="event-deadline">⏱ Inschrijving gesloten</div>`;
      } else if (isWithin24h) {
        const totMin = Math.floor(msLeft / 60000);
        const uren   = Math.floor(totMin / 60);
        const rMin   = totMin % 60;
        const txt    = uren > 0 ? `${uren}u ${rMin}min` : `${rMin}min`;
        deadlineHtml = `<div class="event-deadline urgent deadline-countdown" data-deadline="${dl.toISOString()}">⏱ Inschrijving sluit over <strong>${txt}</strong></div>`;
      } else {
        deadlineHtml = `<div class="event-deadline${urgent ? ' urgent' : ''}">⏱ Deadline: ${tijdStr}${urgent ? ' — nog ' + dagenTotDeadline + ' dag(en)!' : ''}</div>`;
      }
    }

    // ── Eventdatum aftelklok (bovenaan kaart) ──
    let eventTopHtml = '';
    if (isPast) {
      eventTopHtml = `<div class="countdown-top" style="color:rgba(255,255,255,0.5);">Afgelopen</div>`;
    } else {
      const msToEvent = d - now;
      if (msToEvent > 0 && msToEvent < 24 * 3600 * 1000) {
        const totMin = Math.floor(msToEvent / 60000);
        const uren   = Math.floor(totMin / 60);
        const rMin   = totMin % 60;
        const txt    = uren > 0 ? `${uren}u ${rMin}min` : `${rMin}min`;
        eventTopHtml = `<div class="countdown-top event-countdown" data-eventdate="${d.toISOString()}">Over <strong>${txt}</strong></div>`;
      } else {
        eventTopHtml = `<div class="countdown-top">Over <strong>${dagenOver} dag${dagenOver===1?'':'en'}</strong></div>`;
      }
    }

    // ── Klassen ──
    const klassen = Array.isArray(ev.klassen) ? ev.klassen : [];
    const klassenHtml = klassen.length
      ? klassen.map(k => `<span class="class-tag">${k}</span>`).join('')
      : '<span class="class-tag">Alle klassen</span>';

    // ── Inschrijf-knop ──
    const isGesloten       = isPast || deadlinePassed;
    const evInschr         = _myInschrijvingen.filter(i => i.event_id === ev.id);
    const registeredIds    = new Set(evInschr.map(i => i.rijder_id));
    const alleIn           = _accountRijders.length > 0 && _accountRijders.every(r => registeredIds.has(r.id));
    const geenIn           = evInschr.length === 0;

    let inschrijfBtn;
    if (isGesloten) {
      inschrijfBtn = `<button class="inschrijf-btn vol">Inschrijving gesloten</button>`;
    } else if (geenIn) {
      inschrijfBtn = `<button class="inschrijf-btn" onclick="openInschrijven('${ev.id}')">Inschrijven →</button>`;
    } else if (_accountRijders.length <= 1) {
      inschrijfBtn = `<button class="inschrijf-btn ingeschreven">✓ Ingeschreven</button>`;
    } else {
      const namesHtml = evInschr.map(i => {
        const r    = _accountRijders.find(r => r.id === i.rijder_id);
        const naam = r ? `${r.voornaam||''} ${r.naam||''}`.trim() : 'Rijder';
        return `<span style="display:block;font-size:12px;color:#4cff4c;font-family:'Barlow',sans-serif;">✓ ${naam}</span>`;
      }).join('');
      if (alleIn) {
        inschrijfBtn = `<div class="inschrijf-btn ingeschreven" style="text-align:left;line-height:1.8;">${namesHtml}</div>`;
      } else {
        inschrijfBtn = `<div>${namesHtml}<button class="inschrijf-btn" onclick="openInschrijven('${ev.id}')" style="margin-top:6px;">Nog een rijder inschrijven →</button></div>`;
      }
    }

    const topStyle = `style="${isPast ? 'background:#555;' : ''} align-items:flex-start;"`;
    return `
      <div class="event-card" style="${isPast ? 'opacity:0.7;' : ''}">
        <div class="event-card-top" ${topStyle}>
          <div>
            <span class="event-date">${DAGEN_KORT[d.getDay()]} ${d.getDate()} ${MAANDEN[d.getMonth()]} ${d.getFullYear()}</span>
            ${eventTopHtml}
          </div>
          <span class="event-badge" style="margin-top:2px;">${isPast ? 'Afgelopen' : (ev.type || '')}</span>
        </div>
        <div class="event-body">
          <div class="event-name">${ev.naam}</div>
          <div class="event-circuit">📍 ${ev.circuit}</div>
          ${deadlineHtml}
          <div class="event-classes">${klassenHtml}</div>
          <div class="event-footer">${inschrijfBtn}</div>
        </div>
      </div>`;
  };

  // Komende evenementen
  if (upcoming.length > 0) {
    grid.innerHTML = upcoming.map(buildCard).join('');
  }

  // Afgelopen evenementen
  if (past.length > 0) {
    pastSec.style.display = '';
    pastGrid.innerHTML = past.map(buildCard).join('');
  } else {
    pastSec.style.display = 'none';
  }

  startCountdowns();
}

function startCountdowns() {
  clearInterval(window._cdTimer);
  const deadlineEls   = document.querySelectorAll('.deadline-countdown');
  const eventEls      = document.querySelectorAll('.event-countdown');
  const uitschrijfEls = document.querySelectorAll('.uitschrijf-dl[data-deadline]');
  if (!deadlineEls.length && !eventEls.length && !uitschrijfEls.length) return;

  window._cdTimer = setInterval(() => {
    const now = new Date();
    let expiredEv  = false;
    let expiredUit = false;

    deadlineEls.forEach(el => {
      const dl = new Date(el.dataset.deadline);
      const msLeft = dl - now;
      if (msLeft <= 0) { expiredEv = true; return; }
      const totMin = Math.floor(msLeft / 60000);
      const uren   = Math.floor(totMin / 60);
      const rMin   = totMin % 60;
      el.innerHTML = `⏱ Inschrijving sluit over <strong>${uren > 0 ? uren+'u '+rMin+'min' : rMin+'min'}</strong>`;
    });

    eventEls.forEach(el => {
      const d = new Date(el.dataset.eventdate);
      const msLeft = d - now;
      if (msLeft <= 0) { expiredEv = true; return; }
      const totMin = Math.floor(msLeft / 60000);
      const uren   = Math.floor(totMin / 60);
      const rMin   = totMin % 60;
      el.innerHTML = `Over <strong>${uren > 0 ? uren+'u '+rMin+'min' : rMin+'min'}</strong>`;
    });

    uitschrijfEls.forEach(el => {
      const dl = new Date(el.dataset.deadline);
      const msLeft = dl - now;
      if (msLeft <= 0) { expiredUit = true; return; }
      const totMin = Math.floor(msLeft / 60000);
      const uren   = Math.floor(totMin / 60);
      const rMin   = totMin % 60;
      el.innerHTML = `⏱ Sluit over <strong>${uren > 0 ? uren+'u '+rMin+'min' : rMin+'min'}</strong>`;
    });

    if (expiredEv)  renderEvents();
    if (expiredUit) renderInschrijvingen();
  }, 10000);
}

// ── Dropdown / nav ───────────────────────────
function toggleDropdown() { document.getElementById('user-dropdown').classList.toggle('open'); }
document.addEventListener('click', e => {
  if (!e.target.closest('.nav-right')) document.getElementById('user-dropdown').classList.remove('open');
});

// ── Tabs ─────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('#dfk-root .tab-btn').forEach((b, i) =>
    b.classList.toggle('on', tab === 'evenementen' ? i === 0 : i === 1));
  document.getElementById('tab-evenementen').classList.toggle('on', tab === 'evenementen');
  document.getElementById('tab-inschrijvingen').classList.toggle('on', tab === 'inschrijvingen');
  if (tab === 'inschrijvingen') {
    renderInschrijvingen();
    loadMyInschrijvingen().then(() => renderInschrijvingen());
  }
}

// ── Mijn Inschrijvingen ──────────────────────
function renderInschrijvingen() {
  const container = document.getElementById('inschrijvingen-list');
  const now = new Date();
  const lijst = _myInschrijvingen.filter(i => i.evenementen);

  if (lijst.length === 0) {
    container.innerHTML = `<div class="inschrijvingen-empty"><div class="inschrijvingen-empty-icon">📋</div>Je hebt je nog niet ingeschreven voor een evenement.</div>`;
    return;
  }

  const komend   = lijst.filter(i => new Date(i.evenementen.datum + 'T12:00:00') >= now)
                        .sort((a, b) => new Date(a.evenementen.datum) - new Date(b.evenementen.datum));
  const afgelopen = lijst.filter(i => new Date(i.evenementen.datum + 'T12:00:00') < now)
                         .sort((a, b) => new Date(b.evenementen.datum) - new Date(a.evenementen.datum));

  function renderKaart(r) {
    const ev  = r.evenementen;
    const d   = new Date(ev.datum + 'T12:00:00');
    const datumStr = `${DAGEN_KORT[d.getDay()]} ${d.getDate()} ${MAANDEN[d.getMonth()]} ${d.getFullYear()}`;
    const reg    = new Date(r.bevestigd_op);
    const regStr = `${reg.getDate()} ${MAANDEN[reg.getMonth()]} ${reg.getFullYear()} om ${reg.getHours().toString().padStart(2,'0')}:${reg.getMinutes().toString().padStart(2,'0')}`;
    const isPast = d < now;

    // ── Deadline-logica voor uitschrijven ──
    const dl         = ev.deadline ? new Date(ev.deadline) : null;
    const dlPassed   = dl && dl < now;

    let rechts;
    if (isPast) {
      rechts = `<span style="font-size:11px;color:#444;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;">Afgelopen</span>`;
    } else if (dlPassed) {
      rechts = `<span style="font-size:11px;color:#555;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;text-align:right;line-height:1.6;">Inschrijving<br>gesloten</span>`;
    } else {
      // Knop + eventuele countdown
      let cdHtml = '';
      if (dl) {
        const msLeft = dl - now;
        const dlUur  = dl.getHours().toString().padStart(2,'0');
        const dlMin  = dl.getMinutes().toString().padStart(2,'0');
        const tijdStr = `${dl.getDate()} ${MAANDEN[dl.getMonth()]} ${dl.getFullYear()} ${dlUur}:${dlMin}`;
        if (msLeft < 24 * 3600 * 1000) {
          // Minder dan 24u: live afteller
          const totMin = Math.floor(msLeft / 60000);
          const uren   = Math.floor(totMin / 60);
          const rMin   = totMin % 60;
          const txt    = uren > 0 ? `${uren}u ${rMin}min` : `${rMin}min`;
          cdHtml = `<div class="uitschrijf-dl urgent" data-deadline="${dl.toISOString()}">⏱ Sluit over <strong>${txt}</strong></div>`;
        } else {
          // Meer dan 24u: vaste datum tonen
          cdHtml = `<div class="uitschrijf-dl">Deadline<br>${tijdStr}</div>`;
        }
      }
      rechts = `<div class="uitschrijf-side">
        <button class="uitschrijf-btn" onclick="uitschrijven('${r.id}','${ev.id}')">Uitschrijven</button>
        ${cdHtml}
      </div>`;
    }

    return `
      <div class="inschrijving-card" style="${isPast ? 'border-left-color:#444;opacity:0.6;' : ''}">
        <div class="inschrijving-info">
          <div class="inschrijving-naam">${ev.naam}</div>
          <div class="inschrijving-meta">📅 ${datumStr}</div>
          <div class="inschrijving-meta">📍 ${ev.circuit}${ev.type ? ' &nbsp;·&nbsp; ' + ev.type : ''}</div>
          ${_accountRijders.length > 1 ? (() => { const rdr = _accountRijders.find(x => x.id === r.rijder_id); return rdr ? `<div class="inschrijving-meta" style="color:#fff;">👤 ${(rdr.voornaam||'')+' '+(rdr.naam||'')}</div>` : ''; })() : ''}
          ${r.klasse ? `<div class="inschrijving-meta">🏁 ${r.klasse}${r.startnummer ? ' — #'+r.startnummer : ''}</div>` : ''}
          <div class="inschrijving-reg">Ingeschreven op ${regStr}</div>
        </div>
        ${rechts}
      </div>`;
  }

  let html = '';

  if (komend.length > 0) {
    html += komend.map(renderKaart).join('');
  } else {
    html += `<div class="inschrijvingen-empty" style="margin-bottom:1rem;"><div class="inschrijvingen-empty-icon">📋</div>Geen aankomende inschrijvingen.</div>`;
  }

  if (afgelopen.length > 0) {
    html += `<div style="margin:1.6rem 0 0.8rem;display:flex;align-items:center;gap:10px;">
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#444;">Afgelopen events</span>
      <div style="flex:1;height:1px;background:#2a2a2a;"></div>
    </div>`;
    html += afgelopen.map(renderKaart).join('');
  }

  container.innerHTML = html;
  startCountdowns();
}

async function uitschrijven(inschrijvingId, eventId) {
  if (!confirm('Zeker dat je je wil uitschrijven?')) return;
  const { error } = await _supabase.from('inschrijvingen').delete().eq('id', inschrijvingId);
  if (error) { alert('Uitschrijven mislukt: ' + error.message); return; }
  _myInschrijvingen = _myInschrijvingen.filter(i => i.id !== inschrijvingId);
  if (!_myInschrijvingen.some(i => i.event_id === eventId)) _myEventIds.delete(eventId);
  renderInschrijvingen();
  renderEvents();
}

// ── Account paneel ───────────────────────────
function openAccount() {
  document.getElementById('user-dropdown').classList.remove('open');
  _editingRijder = null;
  _renderAccLijst();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('account-panel').classList.add('open');
}
function closeAccount() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('account-panel').classList.remove('open');
  _editingRijder = null;
}

function _renderAccLijst() {
  document.getElementById('acc-panel-title').textContent = 'Mijn Account';
  document.getElementById('acc-back-btn').style.display = 'none';
  const email = _currentUser?.email || '';
  document.getElementById('acc-body').innerHTML = `
    <span class="section-title">Account</span>
    <label class="field-label">E-mailadres</label>
    <input class="field-input" type="email" value="${email}" disabled style="color:#555;" />
    <label class="field-label">Wachtwoord wijzigen</label>
    <input id="acc-pw" class="field-input" type="password" placeholder="Nieuw wachtwoord" oninput="checkAccPwMatch()" />
    <label class="field-label">Wachtwoord bevestigen</label>
    <input id="acc-pw2" class="field-input" type="password" placeholder="Herhaal nieuw wachtwoord" oninput="checkAccPwMatch()" />
    <p id="acc-pw-msg" style="font-size:12px;min-height:16px;margin-top:-0.5rem;margin-bottom:0.8rem;font-family:'Barlow',sans-serif;"></p>
    <p id="acc-pw-save-msg" class="save-msg" style="text-align:left;margin-top:0;"></p>
    <button class="save-btn" style="margin-top:0.5rem;margin-bottom:2rem;" onclick="saveAccountSettings()">Wachtwoord opslaan →</button>

    <span class="section-title">Rijders</span>
    ${_accountRijders.map(r => `
      <div class="rijder-kaart" onclick="_editRijder('${r.id}')">
        <div>
          <div class="rijder-kaart-naam">${(r.voornaam||'')+' '+(r.naam||'')}</div>
          <div class="rijder-kaart-sub">${r.kart_type === 'huur' ? 'Huurkart' : ((r.klassen||[]).join(', ') || 'Eigen kart')}</div>
        </div>
        <span style="color:#666;font-size:20px;">›</span>
      </div>
    `).join('')}
    <button class="acc-add-btn" onclick="_addRijder()">+ Extra rijder toevoegen</button>
  `;
}

function _rijderFormHTML(r, isExtra) {
  const isEigen = (r.kart_type || 'eigen') !== 'huur';
  const klassenHtml = KLASSEN.map(k => `
    <div class="chk-item" onclick="toggleKlasseChk(this,'acc-klassen-grid','acc-startnrs')">
      <div class="chk-box"><span class="chk-mark">✓</span></div><span class="chk-label">${k}</span>
    </div>`).join('');
  const kampHtml = KAMPIOENSCHAPPEN.map(k => `
    <div class="chk-item" onclick="toggleChk(this)">
      <div class="chk-box"><span class="chk-mark">✓</span></div><span class="chk-label">${k}</span>
    </div>`).join('');
  const benzHtml = BENZ_LABELS.map(txt =>
    `<button class="benz-btn" onclick="pickBenz(this)">⛽&nbsp; ${txt}</button>`).join('');
  const uitrHtml = ['Helm','Pak','Handschoenen','Schoenen','Ribprotector'].map(u => `
    <div class="chk-item" onclick="toggleChk(this)">

function _fillRijderForm(r) {
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('acc-voornaam', r.voornaam);
  set('acc-naam', r.naam);
  set('acc-geboorte', r.geboortedatum);
  set('acc-tel', r.telefoon);
  const isEigen = r.kart_type !== 'huur';
  if (isEigen) {
    const klass = new Set(r.klassen || []);
    document.querySelectorAll('#acc-klassen-grid .chk-item').forEach(item => {
      item.classList.toggle('on', klass.has(item.querySelector('.chk-label')?.textContent.trim()));
    });
    updateStartnrFields('acc-klassen-grid', 'acc-startnrs', r.startnummers || {});
    const kamp = new Set(r.kampioenschappen || []);
    document.querySelectorAll('#acc-kamp-grid .chk-item').forEach(item => {
      item.classList.toggle('on', kamp.has(item.querySelector('.chk-label')?.textContent.trim()));
    });
    setToggle('acc-tog-kart',   !!r.kart_in_werkplaats);
    setToggle('acc-tog-banden', !!r.banden_in_werkplaats);
    setToggle('acc-tog-bak',    !!r.bak_in_werkplaats);
    const benzIdx = BENZ_LABELS.findIndex(l => l === (r.benzine || ''));
    document.querySelectorAll('#acc-benz-opts .benz-btn').forEach((btn, i) =>
      btn.classList.toggle('on', i === benzIdx));
  } else {
    set('acc-lengte', r.lengte);
    set('acc-gewicht', r.gewicht);
    const sel = document.getElementById('acc-huurkart');
    if (sel && r.huurkart_type) sel.value = r.huurkart_type;
    const uitr = new Set(r.uitrusting || []);
    document.querySelectorAll('#acc-uitrusting-grid .chk-item').forEach(item => {
      item.classList.toggle('on', uitr.has(item.querySelector('.chk-label')?.textContent.trim()));
    });
  }
}

function _editRijder(rijderId) {
  _editingRijder = _accountRijders.find(r => r.id === rijderId) || null;
  if (!_editingRijder) return;
  const isExtra = rijderId !== _currentUser.id;
  const naam = `${_editingRijder.voornaam||''} ${_editingRijder.naam||''}`.trim();
  document.getElementById('acc-panel-title').textContent = naam || 'Rijder';
  document.getElementById('acc-back-btn').style.display = '';
  document.getElementById('acc-body').innerHTML = _rijderFormHTML(_editingRijder, isExtra);
  _fillRijderForm(_editingRijder);
}

function _addRijder() {
  _editingRijder = null;
  document.getElementById('acc-panel-title').textContent = 'Nieuwe rijder';
  document.getElementById('acc-back-btn').style.display = '';
  document.getElementById('acc-body').innerHTML = _rijderFormHTML({}, false);
}

function _accTerugNaarLijst() {
  _editingRijder = null;
  _renderAccLijst();
}

function accKiesKartType(type) {
  document.getElementById('acc-eigen-sectie').style.display = type === 'eigen' ? '' : 'none';
  document.getElementById('acc-huur-sectie').style.display  = type === 'huur'  ? '' : 'none';
  document.querySelectorAll('.kart-type-keuze-btn').forEach(b => b.classList.remove('on'));
  document.getElementById(type === 'eigen' ? 'acc-kies-eigen' : 'acc-kies-huur').classList.add('on');
}

function setToggle(rowId, isJa) {
  const row = document.getElementById(rowId);
  if (!row) return;
  row.querySelectorAll('.tog-btn').forEach(b => b.classList.remove('on'));
  const btn = row.querySelector(isJa ? '.tog-btn.yes' : '.tog-btn.no');
  if (btn) btn.classList.add('on');
}

async function saveAccountSettings() {
  const msg = document.getElementById('acc-pw-save-msg');
  msg.textContent = '';
  const pw  = document.getElementById('acc-pw')?.value || '';
  const pw2 = document.getElementById('acc-pw2')?.value || '';
  if (!pw) { msg.style.color='#E02020'; msg.textContent='Vul een nieuw wachtwoord in.'; return; }
  if (pw.length < 8) { msg.style.color='#E02020'; msg.textContent='Minimaal 8 tekens.'; return; }
  if (pw !== pw2)    { msg.style.color='#E02020'; msg.textContent='Wachtwoorden komen niet overeen.'; return; }
  const { error } = await _supabase.auth.updateUser({ password: pw });
  if (error) { msg.style.color='#E02020'; msg.textContent='Fout: '+error.message; return; }
  document.getElementById('acc-pw').value = '';
  document.getElementById('acc-pw2').value = '';
  msg.style.color='#4cff4c'; msg.textContent='✓ Wachtwoord gewijzigd';
}

async function saveRijder() {
  const get = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const msgEl = document.getElementById('acc-save-msg');
  msgEl.textContent = '';
  const isEigen   = document.getElementById('acc-eigen-sectie').style.display !== 'none';
  const isNewRijder = !_editingRijder;
  const rijderId  = _editingRijder?.id || crypto.randomUUID();
  const voornaam  = get('acc-voornaam');
  const naam      = get('acc-naam');
  if (!voornaam || !naam) {
    msgEl.style.color='#E02020'; msgEl.textContent='Vul voornaam en naam in.'; return;
  }
  const profiel = {
    id:            rijderId,
    account_id:    _currentUser.id,
    voornaam, naam,
    geboortedatum: get('acc-geboorte') || null,
    telefoon:      get('acc-tel'),
    kart_type:     isEigen ? 'eigen' : 'huur',
  };
  if (isEigen) {
    const togRows = ['acc-tog-kart','acc-tog-banden','acc-tog-bak'].map(id => document.getElementById(id));
    const benzEl  = document.querySelector('#acc-benz-opts .benz-btn.on');
    Object.assign(profiel, {
      klassen:              [...document.querySelectorAll('#acc-klassen-grid .chk-item.on .chk-label')].map(el => el.textContent.trim()),
      startnummers:         getStartnummers('acc-startnrs'),
      kampioenschappen:     [...document.querySelectorAll('#acc-kamp-grid .chk-item.on .chk-label')].map(el => el.textContent.trim()),
      kart_in_werkplaats:   !!(togRows[0]?.querySelector('.tog-btn.yes.on')),
      banden_in_werkplaats: !!(togRows[1]?.querySelector('.tog-btn.yes.on')),
      bak_in_werkplaats:    !!(togRows[2]?.querySelector('.tog-btn.yes.on')),
      benzine:              benzEl ? benzEl.textContent.replace(/⛽\s*/,'').trim() : null,
    });
  } else {
    Object.assign(profiel, {
      lengte:        parseInt(get('acc-lengte'))  || null,
      gewicht:       parseInt(get('acc-gewicht')) || null,
      huurkart_type: get('acc-huurkart') || null,
      uitrusting:    [...document.querySelectorAll('#acc-uitrusting-grid .chk-item.on .chk-label')].map(el => el.textContent.trim()),
    });
  }
  const { error } = await _supabase.from('profiles').upsert(profiel);
  if (error) { msgEl.style.color='#E02020'; msgEl.textContent='Opslaan mislukt: '+error.message; return; }
  if (isNewRijder) {
    _accountRijders.push(profiel);
  } else {
    const idx = _accountRijders.findIndex(r => r.id === rijderId);
    if (idx >= 0) _accountRijders[idx] = { ..._accountRijders[idx], ...profiel };
  }
  if (rijderId === _currentUser.id) {
    _currentProfile = { ..._currentProfile, ...profiel };
    updateNavbar();
  }
  _editingRijder = null;
  _renderAccLijst();
}

async function deleteExtraRijder(id) {
  const r = _accountRijders.find(x => x.id === id);
  const naam = r ? `${r.voornaam||''} ${r.naam||''}`.trim() : 'deze rijder';
  if (!confirm(`"${naam}" verwijderen uit dit account?`)) return;
  const { error } = await _supabase.from('profiles').delete().eq('id', id);
  if (error) { alert('Verwijderen mislukt: ' + error.message); return; }
  _accountRijders = _accountRijders.filter(x => x.id !== id);
  _editingRijder = null;
  _renderAccLijst();
}

function _getAccountData() {
  const p = _selectedRijder || _currentProfile || {};
  return {
    voornaam:    p.voornaam    || '',
    naam:        p.naam        || '',
    geboorte:    p.geboortedatum || '',
    email:       _currentUser?.email || '',
    telefoon:    p.telefoon    || '',
    klassen:      p.klassen      || [],
    startnummers: p.startnummers || {},
    kampioenen:  p.kampioenschappen || [],
    kartWp:      !!p.kart_in_werkplaats,
    bandenWp:    !!p.banden_in_werkplaats,
    bakWp:       !!p.bak_in_werkplaats,
    benzIdx:     BENZ_LABELS.findIndex(l => l === (p.benzine||'')),
    kartType:    p.kart_type || 'eigen',
    lengte:      p.lengte    || '',
    gewicht:     p.gewicht   || '',
    huurkartType: p.huurkart_type || '',
    uitrusting:  p.uitrusting || [],
  };
}

function openInschrijven(eventId) {
  _currentEvent = _allEvents.find(e => e.id === eventId);
  if (!_currentEvent) return;
  document.getElementById('inschrijf-overlay').classList.add('open');
  document.getElementById('inschrijf-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
  if (_accountRijders.length > 1) {
    _toonRijderKeuze();
  } else {
    _selectedRijder = _accountRijders[0] || _currentProfile;
    _openInschrijvenForm();
  }
}

function _toonRijderKeuze() {
  const ev = _currentEvent;
  const d  = new Date(ev.datum + 'T12:00:00');
  const datumStr = `${DAGEN_KORT[d.getDay()]} ${d.getDate()} ${MAANDEN[d.getMonth()]} ${d.getFullYear()}`;
  const registeredIds  = new Set(_myInschrijvingen.filter(i => i.event_id === ev.id).map(i => i.rijder_id));
  const beschikbaar    = _accountRijders.filter(r => !registeredIds.has(r.id));

  if (beschikbaar.length === 1) {
    _selectedRijder = beschikbaar[0];
    _openInschrijvenForm();
    return;
  }

  document.getElementById('inschrijf-body').innerHTML = `
    <div class="ev-confirm-box">
      <div class="ev-confirm-name">${ev.naam}</div>
      <div class="ev-confirm-meta">📅 ${datumStr} &nbsp;·&nbsp; 📍 ${ev.circuit}</div>
    </div>
    <div class="confirm-vraag">Voor wie inschrijven?</div>
    <p class="confirm-hint">Kies de rijder voor dit event.</p>
    ${beschikbaar.map(r => `
      <div class="rijder-kaart" onclick="_kiesRijderEnSchrijfIn('${r.id}')">
        <div>
          <div class="rijder-kaart-naam">${(r.voornaam||'')+' '+(r.naam||'')}</div>
          <div class="rijder-kaart-sub">${r.kart_type === 'huur' ? 'Huurkart' : ((r.klassen||[]).join(', ') || 'Eigen kart')}</div>
        </div>
        <span style="color:#666;font-size:20px;">›</span>
      </div>`).join('')}
    <button class="annuleer-btn" onclick="sluitInschrijven()">Annuleren</button>
  `;
}

function _kiesRijderEnSchrijfIn(rijderId) {
  _selectedRijder = _accountRijders.find(r => r.id === rijderId) || _currentProfile;
  _openInschrijvenForm();
}

function _openInschrijvenForm() {

  const d   = new Date(ev.datum + 'T12:00:00');

      </div>

  } else {
    kartInfoHtml = `
      <span class="section-title">Kart & Competitie</span>
      ${acc.klassen.length ? acc.klassen.map(k => `
      <div class="cf-two">
        <div class="cf-field"><span class="cf-label">Klasse</span><span class="cf-value">${k}</span></div>
        <div class="cf-field"><span class="cf-label">Startnummer</span><span class="cf-value">${acc.startnummers[k] ? '#'+acc.startnummers[k] : '—'}</span></div>
      </div>`).join('') : `<div class="cf-field"><span class="cf-label">Klasse(n)</span><span class="cf-value">—</span></div>`}
      <div class="cf-field"><span class="cf-label">Kampioenschappen</span><span class="cf-value">${acc.kampioenen.join(', ') || '—'}</span></div>
      <span class="section-title">Materiaal & Benzine</span>
      <div class="cf-field"><span class="cf-label">Kart in werkplaats</span><span class="cf-value">${acc.kartWp ? 'Ja' : 'Nee'}</span></div>
      <div class="cf-field"><span class="cf-label">Banden in werkplaats</span><span class="cf-value">${acc.bandenWp ? 'Ja' : 'Nee'}</span></div>
      <div class="cf-field"><span class="cf-label">Bak in werkplaats</span><span class="cf-value">${acc.bakWp ? 'Ja' : 'Nee'}</span></div>
      <div class="cf-field"><span class="cf-label">Benzine</span><span class="cf-value">${acc.benzIdx >= 0 ? BENZ_LABELS[acc.benzIdx] : '—'}</span></div>`;

  document.getElementById('inschrijf-body').innerHTML = `
    <div class="ev-confirm-box">
      <div class="ev-confirm-name">${ev.naam}</div>
      <div class="ev-confirm-meta">📅 ${datumStr} &nbsp;·&nbsp; 📍 ${ev.circuit}</div>
    </div>

    <span class="section-title" style="margin-top:0;">Persoonlijke gegevens</span>
    <div class="cf-two">
      <div class="cf-field"><span class="cf-label">Voornaam</span><span class="cf-value">${acc.voornaam || '—'}</span></div>
      <div class="cf-field"><span class="cf-label">Naam</span><span class="cf-value">${acc.naam || '—'}</span></div>
    </div>
    <div class="cf-field"><span class="cf-label">Geboortedatum</span><span class="cf-value">${gebStr || '—'}</span></div>
    <div class="cf-field"><span class="cf-label">E-mailadres</span><span class="cf-value">${acc.email || '—'}</span></div>
    <div class="cf-field"><span class="cf-label">Telefoonnummer</span><span class="cf-value">${acc.telefoon || '—'}</span></div>

    <div style="display:flex; align-items:center; justify-content:space-between; margin:1.2rem 0 0.5rem;">

function sluitInschrijven() {
  document.getElementById('inschrijf-overlay').classList.remove('open');
  document.getElementById('inschrijf-panel').classList.remove('open');
  document.body.style.overflow = '';
  _currentEvent   = null;
  _selectedKlasse = null;
  _selectedRijder = null;
}

async function _toonBevestiging() {
  const ev = _currentEvent;
  if (!ev) return;

  // Lees geselecteerde klasse en opmerking vóór innerHTML vervangen
  const klasse      = _selectedKlasse;
  const rijder      = _selectedRijder || _currentProfile;
  const startnummer = klasse ? (rijder?.startnummers?.[klasse] ?? null) : null;
  const opmerking   = (document.getElementById('inschrijf-opmerking')?.value || '').trim();

  const body = document.getElementById('inschrijf-body');
  body.innerHTML = `<div style="text-align:center;padding:3rem 1rem;color:#888;">Bezig met inschrijven...</div>`;

  const { error } = await _supabase.from('inschrijvingen').insert({
    rijder_id:   _selectedRijder?.id || _currentUser.id,
    event_id:    ev.id,
    klasse:      klasse      || null,
    startnummer: startnummer || null,
    opmerking:   opmerking   || null,
  });

  if (error && error.code !== '23505') {
    body.innerHTML = `<div style="padding:2rem; color:#E02020; font-family:'Barlow',sans-serif;">
      Inschrijving mislukt:<br><strong>${error.message}</strong><br><br>
      <button class="annuleer-btn" onclick="sluitInschrijven()">Sluiten</button>
    </div>`;
    return;
  }

  // Update lokale state
  _myEventIds.add(ev.id);
  _myInschrijvingen.push({
    id: crypto.randomUUID(),
    event_id: ev.id,
    rijder_id: _selectedRijder?.id || _currentUser.id,
    klasse:      klasse      || null,
    startnummer: startnummer || null,
    bevestigd_op: new Date().toISOString(),
    evenementen: ev,
  });
  renderEvents();

  const d = new Date(ev.datum + 'T12:00:00');
  const datumStr = `${DAGEN_KORT[d.getDay()]} ${d.getDate()} ${MAANDEN[d.getMonth()]} ${d.getFullYear()}`;

  body.innerHTML = `
    <div style="text-align:center; padding:2.5rem 1rem 1.5rem;">
      <div style="font-size:52px; margin-bottom:1rem;">✅</div>
      <div style="font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:28px; color:#fff; letter-spacing:2px; text-transform:uppercase; margin-bottom:0.4rem;">Inschrijving bevestigd!</div>
      <p style="font-size:13px; color:#888; margin-bottom:2rem;">Je inschrijving is succesvol ingediend.</p>
    </div>
    <div class="ev-confirm-box" style="margin-bottom:2rem;">
      <div class="ev-confirm-name">${ev.naam}</div>
      <div class="ev-confirm-meta" style="margin-top:6px;">📅 ${datumStr}</div>
      <div class="ev-confirm-meta">📍 ${ev.circuit}</div>
      ${klasse ? `<div class="ev-confirm-meta" style="margin-top:6px;">🏁 ${klasse}${startnummer ? ' — #'+startnummer : ''}</div>` : ''}
    </div>
    <button class="bevestig-btn" onclick="sluitInschrijven()">Sluiten</button>`;
}

// ── Aanpassen in inschrijf-paneel ────────────
function enableInschrijfEdit() {
  const ev  = _currentEvent;
  if (!ev) return;
  const d   = new Date(ev.datum + 'T12:00:00');
  const datumStr = `${DAGEN_KORT[d.getDay()]} ${d.getDate()} ${MAANDEN[d.getMonth()]} ${d.getFullYear()}`;
  const acc = _getAccountData();

  const isEigen = acc.kartType !== 'huur';
  const selectedKamp  = new Set(acc.kampioenen);
  const selectedKlass = new Set(acc.klassen);
  const selectedUitr  = new Set(acc.uitrusting);

  let kartEditHtml = '';
  if (isEigen) {
    const klassHtml = KLASSEN.map(k => `
      <div class="chk-item klasse-chk${selectedKlass.has(k)?' on':''}" onclick="toggleKlasseChk(this,'inp-klassen-grid','inp-startnrs')">
        <div class="chk-box"><span class="chk-mark">✓</span></div><span class="chk-label">${k}</span>
      </div>`).join('');
    // Pre-build startnr fields for currently selected klassen
    const initStartnrRows = acc.klassen.map(k => `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:0.5rem;">
        <span style="font-size:13px;color:#aaa;flex:1;font-family:'Barlow',sans-serif;">${k}</span>
        <input class="field-input" type="number" data-klasse="${k}" placeholder="#"
          value="${acc.startnummers[k] || ''}"
          style="margin-bottom:0;width:90px;text-align:center;padding:9px 6px;color:#fff;" />
      </div>`).join('');
    const kampHtml = KAMPIOENSCHAPPEN.map(k => `
      <div class="chk-item kamp-chk${selectedKamp.has(k)?' on':''}" onclick="toggleChk(this)">
        <div class="chk-box"><span class="chk-mark">✓</span></div><span class="chk-label">${k}</span>
      </div>`).join('');
    const benzHtml = BENZ_LABELS.map((txt, i) =>
      `<button class="benz-btn${i===acc.benzIdx?' on':''}" onclick="pickBenzInschrijf(this)">⛽&nbsp; ${txt}</button>`
    ).join('');
    const togRow = (label, isJa) => `
      <div class="toggle-row"><span>${label}</span>
        <div class="toggle-group">
          <button class="tog-btn yes${isJa?' on':''}" onclick="tog(this)">Ja</button>
          <button class="tog-btn no${!isJa?' on':''}" onclick="tog(this)">Nee</button>
        </div>
      </div>`;
    kartEditHtml = `
      <span class="section-title">Kart & Competitie</span>
      <label class="field-label">Klasse(n)</label>
      <div class="chk-grid" id="inp-klassen-grid" style="margin-bottom:0.5rem;">${klassHtml}</div>
      <div id="inp-startnrs" style="display:${acc.klassen.length?'':'none'};margin-bottom:1rem;">
        <label class="field-label">Startnummer per klasse</label>
        <div class="startnr-list">${initStartnrRows}</div>
      </div>
      <label class="field-label" style="margin-top:0.5rem;display:block;">Kampioenschappen</label>
      <div class="chk-grid">${kampHtml}</div>
      <span class="section-title">Materiaal in werkplaats</span>
      ${togRow('Kart in onze werkplaats', acc.kartWp)}
      ${togRow('Banden in onze werkplaats', acc.bandenWp)}
      ${togRow('Bak met materiaal in werkplaats', acc.bakWp)}
      <span class="section-title">Benzine</span>
      <div class="benzine-opts">${benzHtml}</div>`;
  } else {
    const uitrHtml = ['Helm','Pak','Handschoenen','Schoenen','Ribprotector'].map(u => `
      <div class="chk-item${selectedUitr.has(u)?' on':''}" onclick="toggleChk(this)">
        <div class="chk-box"><span class="chk-mark">✓</span></div><span class="chk-label">${u}</span>
      </div>`).join('');
    kartEditHtml = `
      <span class="section-title">Rijder afmetingen</span>
      <div class="two-col">
        <div><label class="field-label">Lengte (cm)</label><input id="inp-lengte" class="field-input" type="number" value="${acc.lengte}" /></div>
        <div><label class="field-label">Gewicht (kg)</label><input id="inp-gewicht" class="field-input" type="number" value="${acc.gewicht}" /></div>
      </div>
      <span class="section-title">Kart huren</span>
      <label class="field-label">Type kart</label>
      <select id="inp-huurkart" class="field-select">
        <option value="">Selecteer...</option>
        ${['Formula Honda Cadet','Formula Honda Junior','Formula Honda Senior','Rotax Max'].map(k =>
          `<option${k===acc.huurkartType?' selected':''}>${k}</option>`).join('')}
      </select>
      <span class="section-title">Benodigde uitrusting</span>
      <div class="chk-grid">${uitrHtml}</div>`;
  }

  document.getElementById('inschrijf-body').innerHTML = `
    <div class="ev-confirm-box">
      <div class="ev-confirm-name">${ev.naam}</div>
      <div class="ev-confirm-meta">📅 ${datumStr} &nbsp;·&nbsp; 📍 ${ev.circuit}</div>
    </div>
    <span class="section-title" style="margin-top:0;">Persoonlijke gegevens</span>
    <div class="two-col">
      <div><label class="field-label">Voornaam</label><input id="inp-voornaam" class="field-input" type="text" value="${acc.voornaam}" /></div>
      <div><label class="field-label">Naam</label><input id="inp-naam" class="field-input" type="text" value="${acc.naam}" /></div>
    </div>
    <label class="field-label">Geboortedatum rijder</label>
    <input id="inp-geboorte" class="field-input" type="date" value="${acc.geboorte}" />
    <label class="field-label">E-mailadres</label>
    <input id="inp-email" class="field-input" type="email" value="${acc.email}" />
    <label class="field-label">Telefoonnummer</label>
    <input id="inp-tel" class="field-input" type="tel" value="${acc.telefoon}" />
    ${kartEditHtml}
    <span class="section-title">Klasse voor dit event</span>
    ${buildKlasseKeuzeHtml(acc.klassen, acc.startnummers)}
    <button class="bevestig-btn" style="margin-top:0.8rem;" onclick="bevestigInschrijving()">Opslaan & bevestigen →</button>
    <button class="annuleer-btn" onclick="openInschrijven(_currentEvent.id)">← Terug</button>
  `;
}

// ── Klasse kiezen voor event ──────────────────
function selectKlasseVoorEvent(item) {
  item.closest('.klasse-keuze-grid').querySelectorAll('.chk-item').forEach(el => el.classList.remove('on'));
  item.classList.add('on');
  _selectedKlasse = item.dataset.klasse;
}

function buildKlasseKeuzeHtml(klassen, startnummers) {
  if (!klassen || klassen.length === 0) {
    return `<p style="font-size:13px;color:#666;padding:8px 0;font-family:'Barlow',sans-serif;">
      Geen klasse ingesteld. Stel je klasse in via <em style="color:#E02020;font-style:normal;cursor:pointer;" onclick="sluitInschrijven();openAccount()">Mijn account</em>.
    </p>`;
  }
  // Zorg dat een geldige klasse geselecteerd is
  if (!_selectedKlasse || !klassen.includes(_selectedKlasse)) _selectedKlasse = klassen[0];
  const enkelvoud = klassen.length === 1;
  return `
    <p style="font-size:11px;color:#666;margin-bottom:0.5rem;font-family:'Barlow',sans-serif;">
      ${enkelvoud ? 'Jouw klasse voor dit event:' : 'Kies de klasse waarmee je deelneemt:'}
    </p>
    <div class="klasse-keuze-grid" style="display:flex;flex-direction:column;gap:6px;margin-bottom:1rem;">
      ${klassen.map(k => {
        const nr  = startnummers?.[k];
        const isOn = k === _selectedKlasse;
        return `<div class="chk-item${isOn?' on':''}" data-klasse="${k}"
                  onclick="selectKlasseVoorEvent(this)"
                  style="justify-content:space-between;">
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="chk-box"><span class="chk-mark">✓</span></div>
            <span class="chk-label">${k}</span>
          </div>
          ${nr ? `<span style="font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:#fff;flex-shrink:0;margin-left:8px;">#${nr}</span>` : ''}
        </div>`;
      }).join('')}
    </div>`;
}

function pickBenz(btn) {
  document.querySelectorAll('#acc-benz-opts .benz-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}
function pickBenzInschrijf(btn) {
  btn.closest('.benzine-opts').querySelectorAll('.benz-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}
function toggleChk(item) { item.classList.toggle('on'); }

// ── Startnummer per klasse helpers ────────────
function updateStartnrFields(gridId, containerId, preValues) {
  const grid      = document.getElementById(gridId);
  const container = document.getElementById(containerId);
  if (!grid || !container) return;
  const selected = [...grid.querySelectorAll('.chk-item.on .chk-label')].map(el => el.textContent.trim());
  const list     = container.querySelector('.startnr-list');
  if (selected.length === 0) {
    container.style.display = 'none';
    if (list) list.innerHTML = '';
    return;
  }
  container.style.display = '';
  list.innerHTML = selected.map(k => `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:0.5rem;">
      <span style="font-size:13px;color:#aaa;flex:1;font-family:'Barlow',sans-serif;">${k}</span>
      <input class="field-input" type="number" data-klasse="${k}" placeholder="#"
        value="${(preValues && preValues[k]) ? preValues[k] : ''}"
        style="margin-bottom:0;width:90px;text-align:center;padding:9px 6px;color:#fff;" />
    </div>`).join('');
}
function toggleKlasseChk(item, gridId, containerId) {
  const container = document.getElementById(containerId);
  const prev = {};
  if (container) container.querySelectorAll('input[data-klasse]').forEach(inp => { if (inp.value) prev[inp.dataset.klasse] = inp.value; });
  item.classList.toggle('on');
  updateStartnrFields(gridId, containerId, prev);
}
function getStartnummers(containerId) {
  const result = {};
  const container = document.getElementById(containerId);
  if (!container) return result;
  container.querySelectorAll('input[data-klasse]').forEach(inp => { if (inp.value) result[inp.dataset.klasse] = parseInt(inp.value); });
  return result;
}

function tog(btn) {
  btn.closest('.toggle-group').querySelectorAll('.tog-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

async function bevestigInschrijving() {
  const get = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  const isEigen = (_currentProfile?.kart_type !== 'huur');

  // Lees geselecteerde klasse uit de kiezer in het formulier
  const gekozenKlasse = document.querySelector('#inschrijf-panel .klasse-keuze-grid .chk-item.on')?.dataset.klasse;
  if (gekozenKlasse) _selectedKlasse = gekozenKlasse;

  // Update profiel in Supabase
  const profiel = {
    id:            _selectedRijder?.id || _currentUser.id,
    voornaam:      get('inp-voornaam'),
    naam:          get('inp-naam'),
    geboortedatum: get('inp-geboorte') || null,
    telefoon:      get('inp-tel'),
  };

  if (isEigen) {
    const benzEl  = document.querySelector('#inschrijf-panel .benz-btn.on');
    const allBenz = [...document.querySelectorAll('#inschrijf-panel .benz-btn')];
    Object.assign(profiel, {
      klassen:              [...document.querySelectorAll('#inschrijf-panel .klasse-chk.on .chk-label')].map(el => el.textContent.trim()),
      startnummers:         getStartnummers('inp-startnrs'),
      kampioenschappen:     [...document.querySelectorAll('#inschrijf-panel .kamp-chk.on .chk-label')].map(el => el.textContent.trim()),
      kart_in_werkplaats:   !!(document.querySelectorAll('#inschrijf-panel .toggle-group')[0]?.querySelector('.tog-btn.yes.on')),
      banden_in_werkplaats: !!(document.querySelectorAll('#inschrijf-panel .toggle-group')[1]?.querySelector('.tog-btn.yes.on')),
      bak_in_werkplaats:    !!(document.querySelectorAll('#inschrijf-panel .toggle-group')[2]?.querySelector('.tog-btn.yes.on')),
      benzine:              benzEl ? BENZ_LABELS[allBenz.indexOf(benzEl)] || null : null,
    });
  } else {
    Object.assign(profiel, {
      lengte:        parseInt(get('inp-lengte'))   || null,
      gewicht:       parseInt(get('inp-gewicht'))  || null,
      huurkart_type: get('inp-huurkart') || null,
      uitrusting:    [...document.querySelectorAll('#inschrijf-panel .chk-item.on .chk-label')].map(el => el.textContent.trim()),
    });
  }

  const { error: pErr } = await _supabase.from('profiles').upsert(profiel);
  if (!pErr) _currentProfile = { ..._currentProfile, ...profiel };

  await _toonBevestiging();
}
</script>

    setTimeout(function() {
      meta.content = 'width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, user-scalable=yes';
    }, 300);
  });
})();
</script>
