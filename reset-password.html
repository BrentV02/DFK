<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFK – Nieuw wachtwoord instellen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0a0a0a; min-height: 100vh; }
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500&display=swap');
    #dfk-root * { box-sizing: border-box; }
    #dfk-root { background: #0a0a0a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; position: relative; }
    #dfk-root .top-bar { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: #E02020; }
    #dfk-root .bot-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: #E02020; }
    #dfk-root .logo { text-align: center; margin-bottom: 2rem; }
    #dfk-root .logo-line { width: 40px; height: 3px; background: #E02020; margin: 10px auto 0; display: block; }
    #dfk-root .card { background: #141414; border: 1px solid #2a2a2a; border-top: 3px solid #E02020; border-radius: 4px; width: 100%; max-width: 420px; padding: 2rem; }
    #dfk-root .card-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; color: #fff; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
    #dfk-root .card-sub { font-size: 13px; color: #666; margin-bottom: 1.8rem; font-family: 'Barlow', sans-serif; line-height: 1.5; }
    #dfk-root .field-label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-bottom: 6px; font-family: 'Barlow', sans-serif; }
    #dfk-root .field-input { display: block; width: 100%; background: #1c1c1c; border: 1px solid #333; color: #fff; padding: 11px 12px; font-size: 14px; border-radius: 3px; margin-bottom: 1rem; outline: none; font-family: 'Barlow', sans-serif; }
    #dfk-root .field-input:focus { border-color: #E02020; }
    #dfk-root .submit-btn { display: block; width: 100%; padding: 14px 20px; margin-top: 0.5rem; background: #E02020; color: #fff; border: none; border-radius: 3px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; }
    #dfk-root .submit-btn:hover { background: #c01010; }
    #dfk-root .submit-btn:disabled { background: #555; cursor: not-allowed; }
    #dfk-root .msg { font-size: 12px; min-height: 18px; margin-bottom: 0.6rem; font-family: 'Barlow', sans-serif; }
    #dfk-root .center { text-align: center; }
    #dfk-root .icon { font-size: 38px; margin-bottom: 0.8rem; }
    #dfk-root .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #333; border-top-color: #E02020; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="dfk-root">
  <div class="top-bar"></div>
  <div class="bot-bar"></div>

  <div class="logo">
    <img src="logos/dfk-logo.png" alt="DFK Logo" style="height:72px;width:auto;display:block;margin:0 auto 0.6rem;" />
    <span class="logo-line"></span>
  </div>

  <div class="card">

    <!-- Laden -->
    <div id="state-loading" class="center">
      <div class="spinner"></div>
      <p style="color:#555;font-family:'Barlow',sans-serif;font-size:13px;">Link wordt gecontroleerd...</p>
    </div>

    <!-- Formulier -->
    <div id="state-form" style="display:none;">
      <div class="card-title">Nieuw wachtwoord</div>
      <p class="card-sub">Kies een nieuw wachtwoord voor je DFK-account.</p>

      <label class="field-label">Nieuw wachtwoord</label>
      <input id="pw1" class="field-input" type="password" placeholder="Minimaal 8 tekens" oninput="checkMatch()" />

      <label class="field-label">Wachtwoord bevestigen</label>
      <input id="pw2" class="field-input" type="password" placeholder="Herhaal wachtwoord" oninput="checkMatch()" />

      <p id="match-msg" class="msg"></p>
      <p id="save-msg"  class="msg" style="text-align:center;"></p>

      <button id="save-btn" class="submit-btn" onclick="savePassword()">Wachtwoord opslaan →</button>
    </div>

    <!-- Gelukt -->
    <div id="state-success" style="display:none;" class="center">
      <div class="icon">✅</div>
      <div class="card-title" style="margin-bottom:0.6rem;">Wachtwoord opgeslagen</div>
      <p class="card-sub">Je wachtwoord is gewijzigd. Je kan nu inloggen.</p>
      <button class="submit-btn" onclick="window.location.href='index.html'">Naar inloggen →</button>
    </div>

    <!-- Ongeldige link -->
    <div id="state-error" style="display:none;" class="center">
      <div class="icon">⚠️</div>
      <div class="card-title" style="margin-bottom:0.6rem;">Link ongeldig</div>
      <p class="card-sub">Deze reset-link is verlopen of al gebruikt.<br>Vraag een nieuwe aan via de inlogpagina.</p>
      <button class="submit-btn" onclick="window.location.href='index.html'">Naar inloggen →</button>
    </div>

  </div>
</div>

<script>
// ── Eigen Supabase-client met detectSessionInUrl: true ──
const SUPABASE_URL = 'https://peycptkmzttxsqalwbtg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_wyecy0yXOa9kd3YG-VHPpw_xKxxPEFW';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession:     true,
    detectSessionInUrl: true,   // nodig om reset-token uit URL te lezen
    autoRefreshToken:   true,
    flowType:           'pkce', // Supabase v2 standaard
  }
});

function toon(status) {
  ['loading','form','success','error'].forEach(s =>
    document.getElementById('state-' + s).style.display = s === status ? '' : 'none'
  );
}

// ── Token verwerken ───────────────────────────
(async () => {
  // Methode 1: PKCE — ?code= in de query string (Supabase v2 standaard)
  const searchParams = new URLSearchParams(window.location.search);
  const code = searchParams.get('code');

  if (code) {
    const { error } = await sb.auth.exchangeCodeForSession(code);
    toon(error ? 'error' : 'form');
    return;
  }

  // Methode 2: Legacy — #access_token= in de hash
  const hashParams = new URLSearchParams(window.location.hash.substring(1));
  const type       = hashParams.get('type');
  const access     = hashParams.get('access_token');
  const refresh    = hashParams.get('refresh_token');

  if (type === 'recovery' && access) {
    const { error } = await sb.auth.setSession({
      access_token:  access,
      refresh_token: refresh || '',
    });
    toon(error ? 'error' : 'form');
    return;
  }

  // Methode 3: Supabase heeft de sessie al zelf opgepikt via detectSessionInUrl
  const { data } = await sb.auth.getSession();
  toon(data?.session ? 'form' : 'error');
})();

// ── Live wachtwoord-match check ───────────────
function checkMatch() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('match-msg');
  if (!pw2) { msg.textContent = ''; return; }
  if (pw1 === pw2) {
    msg.style.color = '#4cff4c';
    msg.textContent = '✓ Wachtwoorden komen overeen';
  } else {
    msg.style.color = '#E02020';
    msg.textContent = 'Wachtwoorden komen niet overeen';
  }
}

// ── Wachtwoord opslaan ────────────────────────
async function savePassword() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('save-msg');
  const btn = document.getElementById('save-btn');

  if (!pw1)           { msg.style.color='#E02020'; msg.textContent='Vul een wachtwoord in.'; return; }
  if (pw1.length < 8) { msg.style.color='#E02020'; msg.textContent='Wachtwoord moet minimaal 8 tekens zijn.'; return; }
  if (pw1 !== pw2)    { msg.style.color='#E02020'; msg.textContent='Wachtwoorden komen niet overeen.'; return; }

  btn.textContent = 'Bezig...';
  btn.disabled    = true;
  msg.textContent = '';

  const { error } = await sb.auth.updateUser({ password: pw1 });

  if (error) {
    msg.style.color = '#E02020';
    msg.textContent = 'Fout: ' + error.message;
    btn.textContent = 'Wachtwoord opslaan →';
    btn.disabled    = false;
  } else {
    await sb.auth.signOut();
    toon('success');
  }
}
</script>
<script>
(function() {
  var meta = document.querySelector('meta[name="viewport"]');
  document.addEventListener('touchend', function() {
    meta.content = 'width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no';
    setTimeout(function() {
      meta.content = 'width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, user-scalable=yes';
    }, 300);
  });
})();
</script>

</body>
</html>
